<!DOCTYPE html>
<!-- version:v1.0 · 2026-07-01 · 404.html — custom GitHub Pages 404, matches index.html design tokens -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — The Scratch Project</title>
<meta name="robots" content="noindex">
<style>
@font-face{font-family:'Playfair Display';font-style:normal;font-weight:900;font-display:swap;src:url('fonts/playfair-display-latin-900-normal.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/inter-latin-400-normal.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url('fonts/inter-latin-500-normal.woff2') format('woff2')}
@font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:swap;src:url('fonts/ibm-plex-mono-latin-600-normal.woff2') format('woff2')}

:root{
  --bg:#f2f4f0; --surface:#ffffff; --border:#d8ddd4;
  --text-primary:#111c0e; --text-body:#2e3a2a; --text-muted:#566050;
  --lime:#2d7a1c; --lime-hi:#3aaa22; --lime-bg:#f1faf0; --lime-border:#88cc78;
  --gold-hi:#e8b800;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text-body); font-family:'Inter',sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px; text-align:center;
}
.wrap{max-width:480px;}
.eyebrow{
  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
  letter-spacing:.22em; text-transform:uppercase; color:var(--lime);
  margin-bottom:18px; display:block;
}
.stray-ball{font-size:2.6rem; margin-bottom:8px; line-height:1;}
h1{
  font-family:'Playfair Display',serif; font-weight:900; color:var(--text-primary);
  font-size:clamp(1.8rem,7vw,2.6rem); line-height:1.15; margin-bottom:14px;
}
h1 em{color:var(--gold-hi); font-style:italic;}
p{font-size:15px; line-height:1.65; color:var(--text-muted); margin-bottom:28px;}
.actions{display:flex; flex-wrap:wrap; gap:12px; justify-content:center;}
.btn{
  font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
  padding:13px 24px; border-radius:8px; text-decoration:none;
  transition:transform .15s, border-color .15s;
}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--lime); color:#ffffff;}
.btn-primary:hover{background:var(--lime-hi);}
.btn-secondary{background:var(--surface); color:var(--text-primary); border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--lime-border);}
</style>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
</head>
<body>
<div class="wrap">
  <div class="stray-ball">🏌️</div>
  <span class="eyebrow">The Scratch Project</span>
  <h1>That one's <em>out of bounds</em></h1>
  <p>The page you're looking for doesn't exist, or the link's out of date. Everything else is exactly where you left it.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Back to All Guides</a>
    <a href="/quick_start.html" class="btn btn-secondary">Quick Start</a>
  </div>
</div>
</body>
</html>
